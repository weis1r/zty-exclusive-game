name: Deploy to CloudBase

on:
  push:
    branches:
      - main
      - 美术表现333
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudbase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          DEPLOY_TARGET: cloudbase
        run: npm run build

      - name: Restore CloudBase credentials
        env:
          CLOUDBASE_AUTH_JSON_B64: ${{ secrets.CLOUDBASE_AUTH_JSON_B64 }}
          CLOUDBASE_CONFIG_JSON_B64: ${{ secrets.CLOUDBASE_CONFIG_JSON_B64 }}
        run: |
          mkdir -p "$HOME/.config/.cloudbase"
          printf '%s' "$CLOUDBASE_AUTH_JSON_B64" | base64 --decode > "$HOME/.config/.cloudbase/auth.json"
          printf '%s' "$CLOUDBASE_CONFIG_JSON_B64" | base64 --decode > "$HOME/.config/.cloudbase/config.json"

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to CloudBase hosting
        env:
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
        run: cloudbase hosting:deploy dist -e "$CLOUDBASE_ENV_ID"
